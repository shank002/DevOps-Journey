version: "3.9"

services:
  web:
    image: nginx:1.25-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-net
    depends_on:
      - api
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - "5000"
    networks:
      - frontend-net
      - backend-net
    environment:
      - DATABASE_URL=postgresql://appuser:${DB_PASS}@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    expose:
      - "5432"
    networks:
      - backend-net
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=appdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      retries: 5

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  pgdata:
